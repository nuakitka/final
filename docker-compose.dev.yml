services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: library_db_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-library_db}
      POSTGRES_USER: ${POSTGRES_USER:-library_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-library_password}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - library_network_dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-library_user} -d ${POSTGRES_DB:-library_db}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: library_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - library_network_dev
    restart: unless-stopped

  # FastAPI Application (Development)
  api:
    build: .
    container_name: library_api_dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-library_user}:${POSTGRES_PASSWORD:-library_password}@db:5432/${POSTGRES_DB:-library_db}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-not-for-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DEBUG: ${DEBUG:-true}
      REDIS_URL: redis://redis:6379
      TIMEZONE: ${TIMEZONE:-GMT}
      TZ: ${TZ:-GMT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
    networks:
      - library_network_dev
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local

networks:
  library_network_dev:
    driver: bridge
